<script type="module">
import * as THREE from 'three';

const bgColor = getComputedStyle(document.body).backgroundColor || '#000';
const SHAPES = ['box', 'tetra', 'octa', 'torus', 'ring'];

let scene, camera, renderer;
let objects = [];
let particles;
let mouseX = 0, mouseY = 0;
let width = window.innerWidth;
let height = window.innerHeight;

const canvas = document.getElementById('bg-canvas');
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function randColor() {
    const hue = Math.random() * 360;
    return `hsl(${hue}, 70%, 60%)`;
}

function randGeometry() {
    switch (SHAPES[Math.floor(Math.random() * SHAPES.length)]) {
        case 'box': return new THREE.BoxGeometry(1, 1, 1);
        case 'tetra': return new THREE.TetrahedronGeometry(0.8);
        case 'octa': return new THREE.OctahedronGeometry(0.7);
        case 'torus': return new THREE.TorusGeometry(0.6, 0.2, 8, 12);
        case 'ring': return new THREE.TorusKnotGeometry(0.5, 0.15, 48, 8);
    }
}

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(bgColor);
    scene.fog = new THREE.FogExp2(bgColor, 0.02);

    camera = new THREE.PerspectiveCamera(55, width / height, 0.1, 150);
    camera.position.z = 35;

    renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    createObjects();
    createParticles();

    window.addEventListener('resize', onResize);
    document.addEventListener('mousemove', onMouse);
    requestAnimationFrame(animate);
}

function createObjects() {
    const count = 20 + Math.floor(Math.random() * 15);
    for (let i = 0; i < count; i++) {
        const group = new THREE.Group();
        const geo = randGeometry();
        const color = randColor();
        const edgesGeo = new THREE.EdgesGeometry(geo);

        const faceMat = new THREE.MeshBasicMaterial({
            color, transparent: true, opacity: 0.06 + Math.random() * 0.04, depthWrite: false
        });
        group.add(new THREE.Mesh(geo, faceMat));

        const edgeMat = new THREE.LineBasicMaterial({
            color, transparent: true, opacity: 0.2 + Math.random() * 0.2, depthWrite: false
        });
        group.add(new THREE.LineSegments(edgesGeo, edgeMat));

        const x = (Math.random() - 0.5) * 60;
        const y = (Math.random() - 0.5) * 40;
        const z = (Math.random() - 0.5) * 30;
        group.position.set(x, y, z);
        group.scale.setScalar(0.3 + Math.random() * 1.5);

        group.userData = {
            origin: new THREE.Vector3(x, y, z),
            phase: Math.random() * Math.PI * 2,
            rotSpeed: new THREE.Vector3(
                (Math.random() - 0.5) * 0.004,
                (Math.random() - 0.5) * 0.004,
                (Math.random() - 0.5) * 0.002
            ),
            bobSpeed: 0.2 + Math.random() * 0.5,
            bobAmp: 0.3 + Math.random() * 2,
            driftAmp: 0.2 + Math.random() * 0.6,
        };

        scene.add(group);
        objects.push(group);
    }
}

function createParticles() {
    const count = 100;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        pos[i * 3] = (Math.random() - 0.5) * 70;
        pos[i * 3 + 1] = (Math.random() - 0.5) * 50;
        pos[i * 3 + 2] = (Math.random() - 0.5) * 30;
        const c = new THREE.Color(randColor());
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const c = document.createElement('canvas');
    c.width = c.height = 4;
    c.getContext('2d').fillStyle = '#fff';
    c.getContext('2d').fillRect(0, 0, 4, 4);
    const tex = new THREE.CanvasTexture(c);
    tex.magFilter = THREE.NearestFilter;

    particles = new THREE.Points(geo, new THREE.PointsMaterial({
        size: 0.2, map: tex, transparent: true, opacity: 0.4,
        depthWrite: false, sizeAttenuation: true, vertexColors: true,
    }));
    scene.add(particles);
}

function animate() {
    requestAnimationFrame(animate);
    const speed = reduced ? 0.1 : 1.0;
    const t = performance.now() * 0.001 * speed;

    for (const obj of objects) {
        const d = obj.userData;
        obj.position.y = d.origin.y + Math.sin(t * d.bobSpeed + d.phase) * d.bobAmp;
        obj.position.x = d.origin.x + Math.cos(t * 0.25 + d.phase) * d.driftAmp;
        obj.rotation.x += d.rotSpeed.x * speed;
        obj.rotation.y += d.rotSpeed.y * speed;
        obj.rotation.z += d.rotSpeed.z * speed;
        const edge = obj.children[1];
        if (edge?.material) {
            edge.material.opacity = 0.2 + Math.sin(t * 1.2 + d.phase) * 0.1;
        }
    }

    if (particles) {
        const pos = particles.geometry.attributes.position.array;
        for (let i = 0; i < pos.length; i += 3) {
            pos[i + 1] += 0.006 * speed;
            if (pos[i + 1] > 25) pos[i + 1] = -25;
        }
        particles.geometry.attributes.position.needsUpdate = true;
    }

    if (!reduced) {
        camera.position.x += (mouseX * 1.0 - camera.position.x) * 0.02;
        camera.position.y += (-mouseY * 0.6 - camera.position.y) * 0.02;
        camera.lookAt(scene.position);
    }

    renderer.render(scene, camera);
}

function onResize() {
    width = window.innerWidth;
    height = window.innerHeight;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
}

function onMouse(e) {
    mouseX = (e.clientX / width) * 2 - 1;
    mouseY = (e.clientY / height) * 2 - 1;
}

init();
</script>
